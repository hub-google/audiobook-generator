name: Test Chapter Summary Action

on:
  workflow_dispatch:
    inputs:
      catalog_url:
        description: '小說目錄網址'
        required: true
        default: 'https://tw.hjwzw.com/Book/Chapter/1644'
      start_chap:
        description: '開始章節'
        required: true
        default: '1'
      end_chap:
        description: '結束章節'
        required: true
        default: '10'

permissions:
  contents: read

jobs:
  test_summary:
    name: "🧪 Test Summary Generation (GitHub Actions)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run Catalog Parser & Crawler (Chapters 1 to 10)
        run: |
          python src/catalog_parser.py --url "${{ github.event.inputs.catalog_url }}" --start ${{ github.event.inputs.start_chap }} --end ${{ github.event.inputs.end_chap }}
          python src/crawler.py
          python src/cleaner.py

      - name: Run Summary Generation & Output Results
        run: |
          python -c "
          import os, sys, logging
          sys.path.insert(0, 'src')
          logging.basicConfig(level=logging.INFO)
          from summary_gen import get_or_generate_chapter_summary
          workspace_dir = os.path.abspath('Workspace/凡人修仙傳')
          book_title = '凡人修仙傳'
          print('='*60)
          print('📋 【GitHub Actions】前 10 章大綱摘要測試結果：')
          print('='*60)
          for c in range(1, 11):
              s = get_or_generate_chapter_summary(workspace_dir, book_title, c)
              print(f'第 {c:02d} 章: {s}')
          print('='*60)
          "
