name: Audiobook Automation Pipeline (Parallel)

on:
  workflow_dispatch:
    inputs:
      catalog_url:
        description: '小說目錄網址 (e.g. https://tw.hjwzw.com/Book/Chapter/1644)'
        required: true
        default: 'https://tw.hjwzw.com/Book/Chapter/1644'
      start_chap:
        description: '開始章節 (Start Chapter, 1-based)'
        required: true
        default: '1'
      end_chap:
        description: '結束章節 (End Chapter, 1-based)'
        required: true
        default: '10'
      exclude_chapters:
        description: '排除章節的編號 (逗號分隔，如 12,105,106)'
        required: false
        default: ''
      chapters_per_worker:
        description: '每台工作機負責的章節數 (預設 10，最多 20 台並行)'
        required: true
        default: '10'
      zip_password:
        description: 'ZIP 解密密碼 (可選，從 GUI 或 Secrets 傳入)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  setup:
    name: "🔍 Setup — Parse Catalog & Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen_matrix.outputs.matrix }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse Catalog & Generate config.yaml + matrix.json
        run: |
          python src/catalog_parser.py \
            --url "${{ github.event.inputs.catalog_url }}" \
            --start ${{ github.event.inputs.start_chap }} \
            --end   ${{ github.event.inputs.end_chap }} \
            --output config.yaml \
            --workers ${{ github.event.inputs.chapters_per_worker }} \
            --matrix-output matrix.json \
            --exclude-chapters "${{ github.event.inputs.exclude_chapters }}"

      - name: Export matrix to GitHub Actions output
        id: gen_matrix
        run: |
          echo 'matrix<<EOF' >> $GITHUB_OUTPUT
          cat matrix.json >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Upload config.yaml as shared artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-config
          path: config.yaml

# ─────────────────────────────────────────────────────────────
# Worker Pipeline: 並行獨立處理各 Worker 的章節 (一條龍 End-to-End)
# ─────────────────────────────────────────────────────────────
  process_chapters:
    name: "⚡ Worker ${{ matrix.worker_id }} (Ch ${{ matrix.start_chap }}~${{ matrix.end_chap }})"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Deps (FFmpeg + CJK Fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Download shared config
        uses: actions/download-artifact@v4
        with:
          name: shared-config

      - name: Cache Worker Workspace
        uses: actions/cache@v4
        with:
          path: Workspace/
          key: ${{ matrix.book_title }}-chap${{ matrix.start_chap }}-${{ matrix.end_chap }}-worker${{ matrix.worker_id }}-${{ hashFiles('config.yaml', 'src/**') }}
          restore-keys: |
            ${{ matrix.book_title }}-chap${{ matrix.start_chap }}-${{ matrix.end_chap }}-worker${{ matrix.worker_id }}-${{ hashFiles('config.yaml', 'src/**') }}

      - name: Log Cache Location
        run: |
          echo "=================================================="
          echo "📂 斷點續傳快取路徑 (Cache Location):"
          echo "   • 虛擬機工作目錄: Workspace/"
          echo "   • 雲端快取管理頁: https://github.com/${{ github.repository }}/actions/caches"
          echo "=================================================="

      - name: Run Per-Chapter End-to-End Pipeline (Real-Time Saving)
        run: |
          python src/worker_pipeline.py --stage pipeline --worker-id ${{ matrix.worker_id }} --batch-size 1 --force

      - name: Upload MP4 Videos & Subtitles Only (Lightweight Artifact for YouTube Upload)
        uses: actions/upload-artifact@v4
        with:
          name: mp4-worker-${{ matrix.worker_id }}
          path: |
            Workspace/*/*/Video/
            Workspace/*/*/Subtitles/
            Upload_Subtitles/
          if-no-files-found: warn

      - name: Upload full worker workspace artifact (Heavyweight for Inspection)
        uses: actions/upload-artifact@v4
        with:
          name: video-worker-${{ matrix.worker_id }}
          path: Workspace/
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
# Automatic YouTube API Upload & Playlist Builder (無直播，純 API 暴速上傳)
# ─────────────────────────────────────────────────────────────
  upload_to_youtube:
    name: "📤 Automatic YouTube API Upload (Video + Subtitles + Playlist)"
    needs: process_chapters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Deps (FFmpeg + CJK Fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube API Uploader
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/youtube_api_uploader.py --run-id "${{ github.run_id }}" --repo "${{ github.repository }}" --privacy "public"



