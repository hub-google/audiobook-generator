name: Audiobook Automation Pipeline (Parallel)

on:
  workflow_dispatch:
    inputs:
      catalog_url:
        description: '小說目錄網址 (e.g. https://tw.hjwzw.com/Book/Chapter/1644)'
        required: true
        default: 'https://tw.hjwzw.com/Book/Chapter/1644'
      start_chap:
        description: '開始章節 (Start Chapter, 1-based)'
        required: true
        default: '1'
      end_chap:
        description: '結束章節 (End Chapter, 1-based)'
        required: true
        default: '10'
      exclude_chapters:
        description: '排除章節的編號 (逗號分隔，如 12,105,106)'
        required: false
        default: ''
      chapters_per_worker:
        description: '每台工作機負責的章節數 (預設 10，最多 20 台並行)'
        required: true
        default: '10'
      zip_password:
        description: 'ZIP 解密密碼 (可選，從 GUI 或 Secrets 傳入)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  setup:
    name: "🔍 Setup — Parse Catalog & Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen_matrix.outputs.matrix }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse Catalog & Generate config.yaml + matrix.json
        run: |
          python src/catalog_parser.py \
            --url "${{ github.event.inputs.catalog_url }}" \
            --start ${{ github.event.inputs.start_chap }} \
            --end   ${{ github.event.inputs.end_chap }} \
            --output config.yaml \
            --workers ${{ github.event.inputs.chapters_per_worker }} \
            --matrix-output matrix.json \
            --exclude-chapters "${{ github.event.inputs.exclude_chapters }}"

      - name: Export matrix to GitHub Actions output
        id: gen_matrix
        run: |
          echo 'matrix<<EOF' >> $GITHUB_OUTPUT
          cat matrix.json >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Upload config.yaml as shared artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-config
          path: config.yaml

# ─────────────────────────────────────────────────────────────
# Worker Pipeline: 並行獨立處理各 Worker 的章節 (一條龍 End-to-End)
# ─────────────────────────────────────────────────────────────
  process_chapters:
    name: "⚡ Worker ${{ matrix.worker_id }} (Ch ${{ matrix.start_chap }}~${{ matrix.end_chap }})"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Deps (FFmpeg + CJK Fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Download shared config
        uses: actions/download-artifact@v4
        with:
          name: shared-config

      - name: Cache Worker Workspace
        uses: actions/cache@v4
        with:
          path: Workspace/
          key: ${{ matrix.book_title }}-chap${{ matrix.start_chap }}-${{ matrix.end_chap }}-worker${{ matrix.worker_id }}-${{ hashFiles('config.yaml') }}
          restore-keys: |
            ${{ matrix.book_title }}-chap${{ matrix.start_chap }}-${{ matrix.end_chap }}-worker${{ matrix.worker_id }}-

      - name: Log Cache Location
        run: |
          echo "=================================================="
          echo "📂 斷點續傳快取路徑 (Cache Location):"
          echo "   • 虛擬機工作目錄: Workspace/"
          echo "   • 雲端快取管理頁: https://github.com/${{ github.repository }}/actions/caches"
          echo "=================================================="

      - name: Run Per-Chapter End-to-End Pipeline (Real-Time Saving)
        run: |
          python src/worker_pipeline.py --stage pipeline --worker-id ${{ matrix.worker_id }} --batch-size 1

      - name: Upload worker finished artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-worker-${{ matrix.worker_id }}
          path: Workspace/
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────
# Stage 6: merge — 自動全速推流上傳至 YouTube 生成單一超長大影片
# ─────────────────────────────────────────────────────────────
  merge:
    name: "📦 Merge & Direct Stream to YouTube"
    needs: process_chapters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Direct Stream to YouTube Live
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_STREAM_KEY_2: ${{ secrets.YOUTUBE_STREAM_KEY_2 }}
          YOUTUBE_STREAM_KEY_3: ${{ secrets.YOUTUBE_STREAM_KEY_3 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/stream_to_youtube.py --run-id "${{ github.run_id }}" --repo "${{ github.repository }}"

