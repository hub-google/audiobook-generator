name: Audiobook Automation Pipeline

on:
  workflow_dispatch:
    inputs:
      catalog_url:
        description: '小說目錄網址 (Catalog URL)'
        required: true
        default: 'https://tw.hjwzw.com/Book/1644'
      start_chap:
        description: '開始章節 (Start Chapter Index)'
        required: true
        default: '1'
      end_chap:
        description: '結束章節 (End Chapter Index)'
        required: true
        default: '10'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg & CJK Fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Config from Catalog URL
        run: |
          python src/catalog_parser.py \
            --url "${{ github.event.inputs.catalog_url }}" \
            --start ${{ github.event.inputs.start_chap }} \
            --end ${{ github.event.inputs.end_chap }} \
            --output config.yaml

      - name: Run Audiobook Main Pipeline
        run: |
          python src/main_pipeline.py

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audiobook-output
          path: Output/
          if-no-files-found: warn
