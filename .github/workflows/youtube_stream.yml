name: Stream Audiobooks directly to YouTube Live

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'GitHub Actions Run ID containing video worker artifacts (e.g. 29821206020)'
        required: true
        default: '29821206020'

permissions:
  contents: read
  actions: read

jobs:
  stream_to_youtube:
    name: "🎥 Stream Artifacts to YouTube Live"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Run Direct Stream to YouTube
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_STREAM_KEY_2: ${{ secrets.YOUTUBE_STREAM_KEY_2 }}
          YOUTUBE_STREAM_KEY_3: ${{ secrets.YOUTUBE_STREAM_KEY_3 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/stream_to_youtube.py --run-id "${{ github.event.inputs.run_id }}" --repo "${{ github.repository }}"
